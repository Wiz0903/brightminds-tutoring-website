<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Contact Us | BrightMinds</title>
        <link rel="stylesheet" href="contact_styles.css">
        <script src="contact_script.js" defer></script>
    </head>

    <body> 
        <main class="contact-form">
            <h1 class="title center">Contact Us</h1>
            <p class="description center">Have questions about our tutoring services? Complete the form below and a member of the BrightMinds team will contact you as soon as possible.</p>
            <p class="progress">Progress: <span class="progress-percent">0</span>%</p>
            <form action="">
                <fieldset>
                    <legend>Learner Information</legend>
                    <label for="learner-name">Full Name:</label>
                    <input type="text" name="learner-name" placeholder="e.g., John Doe" size="20" id="learner-name" required/>

                    <label for="grade">Learner Grade:</label>
                    <input type="number" name="grade" placeholder="e.g., 10" size="12" id="grade" required/>
                </fieldset>

                <fieldset>
                    <legend>Parent/Guardian Information</legend>
                    <label for="parent-name">Parent/Guardian Name: </label>
                    <input
                        type="text"
                        name="parent-name"
                        id="parent-name"
                        required
                        placeholder="E.g., Nancy Doe"
                    />

                    <label for="parent-email">Parent/Guardian Email: </label>
                    <input
                        type="email"
                        name="parent-email"
                        id="parent-email"
                        required
                        placeholder="E.g., nancy.doe@example.com"
                    />
                    <p class="email-message"></p>

                    <label for="parent-phone">Parent/Guardian Phone: </label>
                    <input
                        type="tel"
                        name="parent-phone"
                        id="parent-phone"
                        required
                        placeholder="E.g., 063 345 6789"
                    />
                </fieldset>

                <fieldset>
                    <legend>Preferred Contact Method</legend>
                    <label class="contact-method" for="email">Email: </label>
                    <input
                        id="email"
                        class="contact-method-radio-btn"
                        type="radio"
                        name="contact-method"
                        value="email"
                        required
                    />

                    <label class="contact-method" for="phone">Phone: </label>
                    <input
                        id="phone"
                        class="contact-method-radio-btn"
                        type="radio"
                        name="contact-method"
                        value="phone"
                    />
                </fieldset>

                <fieldset>
                    <legend>Additional Notes</legend>
                    <label for="notes">Any specific concerns or topics you'd like to discuss?</label>
                    <textarea id="notes" name="notes" rows="4" cols="50" maxlength="300"></textarea>
                    <p class="character-length"><span class="count-words">0</span> / 300</p>
                </fieldset>

                <button type="submit" class="submit">Submit Form</button>
                <button type="reset" class="reset">Reset Form</button>
             </form>
        </main>
    </body>
</html>
