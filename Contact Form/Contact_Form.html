<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Contact Form</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header>
            <h1>Contact Us</h1>
        </header>
        
        <main>
            <form action="">
                <fieldset>
                    <legend>Personal Information</legend>
                    <label for="full-name">Full Name (Required):</label>
                    <input type="text" name="name" placeholder="e.g., John Doe" size="20" id="full-name" required/>

                    <label for="email">Email Address (Required):</label>
                    <input type="email" name="email" placeholder="example@gmail.com" size="20" id="email" required/>

                    <label for="number">Phone (Optional):</label>
                    <input type="text" name="number" id="number"/>

                    <label for="message">Message:</label>
                    <textarea cols="30" rows="10" name="message" id="message" required></textarea>
                </fieldset>

                <fieldset>
                    <legend>Why did you contact us?</legend>
                    <input id="general-inquiry" type="radio" name="contact-reason" value="general-inquiry" required/>
                    <label for="general-inquiry">General Inquiry</label>
                    <input id="support" type="radio" name="contact-reason" value="support" />
                    <label for="support">Support</label>
                    <input id="feedback" type="radio" name="contact-reason" value="feedback" />
                    <label for="feedback">Feedback</label>
                    <input id="complaint" type="radio" name="contact-reason" value="complaint" />
                    <label for="complaint">Complaint</label>
                </fieldset>

                <button type="submit" id="submit">Submit Form</button>
                <button type="reset" id="reset">Reset Form</button>
             </form>
        </main>
    </body>
</html>
