<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Learner Profile | BrightMinds</title>
        <link rel="stylesheet" href="learner_profile_styles.css">
        <script src="learner_profile_script.js" defer></script>
    </head>

    <body>
        <header>
            <a href="learners.html">← Back to Learners</a>
            <h1>Learner Profile</h1>
        </header>

        <main>
            <section class="learner-information">
                <h2>Learner Information</h2>

                <p><strong>Name:</strong> <span class="learner-name"></span></p>
                <p><strong>Grade:</strong> <span class="learner-grade"></span></p>
                <p><strong>School:</strong> <span class="learner-school"></span></p>
            </section>

            <section class="parent-information">
                <h2>Parent Information</h2>

                <p><strong>Parent/Guardian:</strong> <span class="parent-name"></span></p>
                <p><strong>Phone:</strong> <span class="parent-phone"></span></p>
                <p><strong>Email:</strong> <span class="parent-email"></span></p>
            </section>

            <section class="academic-information">
                <h2>Academic Information</h2>

                <div class="subjects">
                    <strong>Subjects:</strong>
                    <ul class="learner-subjects">
                        
                    </ul>
                </div>

                <p>
                    <strong>Current Challenges:</strong>
                    <span class="current-challenges"></span>
                </p>
            </section>

            <section class="payment-information">
                <h2>Payment Information</h2>

                <p><strong>Method:</strong> <span class="payment-method"></span></p>
                <p><strong>Status:</strong> <span class="payment-status"></span></p>
            </section>
        </main>
    </body>
</html>
